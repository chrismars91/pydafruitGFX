# ---- written with claude

name: Build wheels

on:
  push:
    branches: ["main"]
    tags:     ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  build_wheels:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU (Linux aarch64)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP:  "*-musllinux* cp38-* *-win32"

          # ---- Linux: build SDL2 from source ----
          CIBW_BEFORE_ALL_LINUX: |
            yum install -y cmake make gcc || true
            SDL2_VERSION=2.30.3
            curl -L https://github.com/libsdl-org/SDL/releases/download/release-${SDL2_VERSION}/SDL2-${SDL2_VERSION}.tar.gz | tar xz
            cd SDL2-${SDL2_VERSION}
            cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local -DSDL_STATIC=ON -DSDL_SHARED=ON
            cmake --build build --parallel $(nproc)
            cmake --install build

          # ---- macOS ----
          CIBW_BEFORE_ALL_MACOS: "brew install sdl2"
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=15.0"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            DYLD_LIBRARY_PATH=$(brew --prefix sdl2)/lib
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}

          # ---- Windows: vcpkg SDL2 + delvewheel to bundle SDL2.dll ----
          CIBW_BEFORE_ALL_WINDOWS: >
            vcpkg install sdl2:x64-windows &&
            vcpkg integrate install
          CIBW_ENVIRONMENT_WINDOWS: "CMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
          CIBW_BEFORE_BUILD_WINDOWS: "pip install delvewheel"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            delvewheel repair
            --add-path "C:/vcpkg/installed/x64-windows/bin"
            -w {dest_dir} {wheel}

          CIBW_MANYLINUX_X86_64_IMAGE:  "quay.io/pypa/manylinux2014_x86_64"
          CIBW_MANYLINUX_AARCH64_IMAGE: "quay.io/pypa/manylinux2014_aarch64"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  upload_pypi:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/pydafruit-gfx
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
